<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <!-- <h2 class="text-center mb-4">Manajemen Data Mahasiswa</h2> -->
        <div class="card mb-4 shadow-sm">
            <div class="bs-component">
                <nav class="navbar navbar-expand-lg navbar-light bg-primary" data-bs-theme="dark">
                    <div class="container-fluid">
                    <a class="navbar-brand" href="#">Navbar</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarColor01">
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Mahasiswa</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./pages/dosen.html">Dosen</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./pages/matkul.html">Matakuliah</a>
                        </li>
                        </ul>
                    </div>
                    </div>
                </nav>
                </div>

        </div>

        <div class="card p-4 mb-4 shadow-sm">
            <h5>Tambah / Edit Data</h5>
            <form id="formMahasiswa">
                <input type="hidden" id="mahasiswaId">
                <div class="row">
                    <div class="col-md-4 mb-2">
                        <input type="text" id="nama" class="form-control" placeholder="Nama" required>
                    </div>
                    <div class="col-md-3 mb-2">
                        <input type="text" id="nim" class="form-control" placeholder="Nim" required>
                    </div>
                    <div class="col-md-3 mb-2">
                        <input type="text" id="fakultas" class="form-control" placeholder="Fakultas" required>
                    </div>
                    <div class="col-md-2 mb-2">
                        <button type="submit" class="btn btn-primary w-100">Simpan</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="card p-4 shadow-sm">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Id</th>
                        <th>Nama</th>
                        <th>NIM</th>
                        <th>Fakultas</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- ini untuk akses Javascript -->
                </tbody>
            </table>
        </div>

    </div>
    
    <script src="./js/mahasiswa.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
